name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy-site:
    name: count168.site
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to /var/www/count168
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          debug: true
          script: |
            set -euo pipefail
            if [[ ! -f /var/www/count168/deploy/deploy.sh ]]; then
              echo "ERROR: /var/www/count168/deploy/deploy.sh missing"
              exit 1
            fi
            bash /var/www/count168/deploy/deploy.sh
