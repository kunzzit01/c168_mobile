# count168 — Nginx site config (方案 A: 整站根目录 + frontend/dist/)
#
# 用法:
#   1. 把本文件复制到服务器，例如 /etc/nginx/sites-available/count168.site
#   2. 修改 root、server_name、fastcgi_pass
#   3. ln -s /etc/nginx/sites-available/count168.site /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#
# 网站文件应上传到 root 所指目录，结构示例:
#   /var/www/count168/
#   ├── api/
#   ├── includes/
#   ├── frontend/dist/    ← npm run build 产物
#   ├── images/
#   ├── js/
#   └── favicon.ico

server {
    listen 80;
    # listen 443 ssl http2;   # 启用 HTTPS 时取消注释并配置证书
    server_name count168.site www.count168.site;

    root /var/www/count168;
    index index.html;

    client_max_body_size 64M;

    # --- 压缩（JS/CSS/JSON 体积可降 60%+）---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # --- 根路径 -> 登录 ---
    location = / {
        return 302 /login/05659e0a-5121-427b-b5f2-7bbc43e14b23;
    }

    # --- 旧版 .php / 下划线 URL -> /{page}/{uuid} (302) ---
    location = /index.php              { return 302 /login/05659e0a-5121-427b-b5f2-7bbc43e14b23; }
    location = /dashboard.php          { return 302 /dashboard/f758d9be-bed3-4576-87c0-7c4c39331b87; }
    location = /domain.php             { return 302 /domain/312d9a6c-8f00-44e5-9b05-dfb64c9c356a; }
    location = /announcement.php       { return 302 /announcement/a4c78818-dd94-4668-8b1e-f6a57abdcfd2; }
    location = /account-list.php       { return 302 /account-list/92a50b4f-6d9a-4e3a-b306-109a0361e9a3; }
    location = /add-account.php        { return 302 /add-account/81103520-5bdf-4898-a963-4e63afd1d454; }
    location = /processlist.php        { return 302 /process-list/c4838280-1a60-4ea1-972d-26db47f30179; }
    location = /games_process_list.php { return 302 /games-process-list/2e555271-6f0a-4cf4-b4a4-6561f605627f; }
    location = /bank_process_list.php  { return 302 /bank-process-list/ece7de68-15f0-4f0d-b185-88d5df68f873; }
    location = /userlist.php           { return 302 /userlist/e7cf9194-62c9-4fc7-be66-1655421d117d; }
    location = /useraccess.php         { return 302 /useraccess/10049c16-fb17-4889-8228-98bf465544ef; }
    location = /deleted-log.php        { return 302 /deleted-log/3f5cf41e-53c2-45c5-a2c2-92e26352d8a1$is_args$args; }
    location = /deleted_log.php         { return 302 /deleted-log/3f5cf41e-53c2-45c5-a2c2-92e26352d8a1$is_args$args; }
    location = /ownership.php          { return 302 /ownership/51299ec5-6f49-4714-b66f-59b5b76d8fbb; }
    location = /transaction.php        { return 302 /transaction/cc41ab63-4ef0-49c3-adf5-13f9e5d15c6b; }
    location = /customer_report.php    { return 302 /customer-report/9baddd5f-c601-4b58-ace6-4d764fc2e3ec; }
    location = /domain_report.php      { return 302 /domain-report/c7c6db2c-40f0-4f01-81a9-8fda54d15e42; }
    location = /capture_maintenance.php    { return 302 /capture-maintenance/80e7440b-4857-44d0-be55-8858a3191787; }
    location = /transaction_maintenance.php { return 302 /transaction-maintenance/54308ffa-1396-4de1-950a-6248b29e3caf; }
    location = /formula_maintenance.php    { return 302 /formula-maintenance/fd9b1d8e-8369-4a85-b176-b34c5c27f063; }
    location = /bankprocess_maintenance.php { return 302 /bankprocess-maintenance/e4bef560-3371-4a79-96c9-75ae055ca7d9; }
    location = /payment_maintenance.php    { return 302 /payment-maintenance/0cc1f0cd-e901-48ce-8a30-038ccce3344a; }
    location = /auto_renew.php         { return 302 /auto-renew/148b6740-9f41-47e8-b8ca-e52db63cd4b2; }
    location = /auto-renew.php           { return 302 /auto-renew/148b6740-9f41-47e8-b8ca-e52db63cd4b2; }
    location = /customer_report          { return 302 /customer-report/9baddd5f-c601-4b58-ace6-4d764fc2e3ec; }
    location = /domain_report            { return 302 /domain-report/c7c6db2c-40f0-4f01-81a9-8fda54d15e42; }
    location = /capture_maintenance      { return 302 /capture-maintenance/80e7440b-4857-44d0-be55-8858a3191787; }
    location = /transaction_maintenance  { return 302 /transaction-maintenance/54308ffa-1396-4de1-950a-6248b29e3caf; }
    location = /formula_maintenance      { return 302 /formula-maintenance/fd9b1d8e-8369-4a85-b176-b34c5c27f063; }
    location = /bankprocess_maintenance  { return 302 /bankprocess-maintenance/e4bef560-3371-4a79-96c9-75ae055ca7d9; }
    location = /payment_maintenance      { return 302 /payment-maintenance/0cc1f0cd-e901-48ce-8a30-038ccce3344a; }
    location = /owner_secondary_password.php { return 302 /owner-secondary-password/41ed85ee-645d-4cb9-b269-10dfc9e9ccdc; }
    location = /user_secondary_password.php  { return 302 /user-secondary-password/d6bcd362-fad8-4124-9225-f6d3adc9b70d; }
    location = /reset-password.php       { return 302 /reset-password/d56cf733-0468-4ca0-a14a-231425bc3e83; }
    location = /api/users/user_secondary_password.php { return 302 /user-secondary-password/d6bcd362-fad8-4124-9225-f6d3adc9b70d; }
    location = /member.php               { return 302 /member/45793aa9-4637-452e-8820-2f4611d8b6f6; }
    location = /datacapture.php          { return 302 /datacapture/b98093de-5939-4b90-befd-c47715b399d0$is_args$args; }
    location = /datacapturesummary.php   { return 302 /datacapturesummary/35f3a1b3-8bc3-4dea-8e47-93844d4040c3$is_args$args; }
    location = /transcation              { return 302 /transaction/cc41ab63-4ef0-49c3-adf5-13f9e5d15c6b; }

    location ~ "^/transaction/payment-history/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$" {
        add_header Cache-Control "no-cache";
        try_files /frontend/dist/index.html =404;
    }

    location ~ "^/(login|member|reset-password|owner-secondary-password|user-secondary-password|dashboard|domain|announcement|auto-renew|account-list|add-account|process-list|games-process-list|bank-process-list|userlist|useraccess|deleted-log|ownership|datacapture|datacapturesummary|transaction|customer-report|domain-report|capture-maintenance|transaction-maintenance|formula-maintenance|bankprocess-maintenance|payment-maintenance|transcation|customer_report|domain_report|capture_maintenance|transaction_maintenance|formula_maintenance|bankprocess_maintenance|payment_maintenance|auto_renew)(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12})?$" {
        add_header Cache-Control "no-cache";
        try_files /frontend/dist/index.html =404;
    }

    # --- 特殊内部路由 (对应 .htaccess [L] 规则) ---
    location = /domainapi.php {
        rewrite ^ /api/domain/domain_api.php last;
    }

    location = /logout {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/api/session/logout_api.php;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    # --- Vite 带 hash 的 JS/CSS：长期缓存 ---
    location ^~ /frontend/dist/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- 构建后的页面 CSS（HTML 里带 ?v= 版本号）---
    location ^~ /frontend/dist/css/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /frontend/dist/index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # --- React 静态资源 (base: /frontend/dist/) ---
    location /frontend/dist/ {
        try_files $uri $uri/ /frontend/dist/index.html;
    }

    # --- 根目录静态资源 ---
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location /js/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }

    # --- PHP API ---
    location ^~ /api/ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # --- 其余 .php (cron 脚本等，按需限制访问) ---
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    # Old /p/{uuid} bookmarks -> React redirect to readable URL
    location ~ "^/p/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$" {
        add_header Cache-Control "no-cache";
        try_files /frontend/dist/index.html =404;
    }

    # --- 隐藏敏感目录 ---
    location ~ ^/(includes|database|\.git) {
        deny all;
        return 404;
    }
}
